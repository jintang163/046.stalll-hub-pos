version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: stalll-pos-mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root123}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-stalll_pos}
      MYSQL_USER: ${MYSQL_USER:-stalll}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-stalll123}
      TZ: Asia/Shanghai
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./docker/mysql/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --max_connections=1000
      - --innodb_buffer_pool_size=256M
    networks:
      - stalll-pos-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u$$MYSQL_USER", "-p$$MYSQL_PASSWORD"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  redis:
    image: redis:7-alpine
    container_name: stalll-pos-redis
    command: redis-server --requirepass ${REDIS_PASSWORD:-redis123} --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - stalll-pos-network
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redis123}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  nsqlookupd:
    image: nsqio/nsq:v1.2.1
    container_name: stalll-pos-nsqlookupd
    command: /nsqlookupd
    ports:
      - "4160:4160"
      - "4161:4161"
    networks:
      - stalll-pos-network
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:4161/ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  nsqd:
    image: nsqio/nsq:v1.2.1
    container_name: stalll-pos-nsqd
    command: /nsqd --lookupd-tcp-address=nsqlookupd:4160 --broadcast-address=nsqd --data-path=/data
    ports:
      - "4150:4150"
      - "4151:4151"
    volumes:
      - nsq-data:/data
    depends_on:
      nsqlookupd:
        condition: service_healthy
    networks:
      - stalll-pos-network
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:4151/ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  nsqadmin:
    image: nsqio/nsq:v1.2.1
    container_name: stalll-pos-nsqadmin
    command: /nsqadmin --lookupd-http-address=nsqlookupd:4161
    ports:
      - "4171:4171"
    depends_on:
      nsqlookupd:
        condition: service_healthy
    networks:
      - stalll-pos-network

  minio:
    image: minio/minio:latest
    container_name: stalll-pos-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin123}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    networks:
      - stalll-pos-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  clickhouse:
    image: clickhouse/clickhouse-server:23.8-alpine
    container_name: stalll-pos-clickhouse
    environment:
      CLICKHOUSE_DB: ${CLICKHOUSE_DB:-stall_hub_pos}
      CLICKHOUSE_USER: ${CLICKHOUSE_USER:-default}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD:-}
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 1
    ports:
      - "8123:8123"
      - "19000:9000"
    volumes:
      - clickhouse-data:/var/lib/clickhouse
      - clickhouse-logs:/var/log/clickhouse-server
    networks:
      - stalll-pos-network
    healthcheck:
      test: ["CMD", "clickhouse-client", "--query", "SELECT 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: stalll-pos-backend
    environment:
      - GIN_MODE=${GIN_MODE:-debug}
      - SERVER_PORT=${SERVER_PORT:-8080}
      - DATABASE_HOST=mysql
      - DATABASE_PORT=3306
      - DATABASE_USER=${MYSQL_USER:-stalll}
      - DATABASE_PASSWORD=${MYSQL_PASSWORD:-stalll123}
      - DATABASE_NAME=${MYSQL_DATABASE:-stalll_pos}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD:-redis123}
      - NSQ_NSQD_ADDRESS=nsqd:4150
      - NSQ_LOOKUPD_ADDRESS=nsqlookupd:4161
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ACCESS_KEY=${MINIO_ROOT_USER:-minioadmin}
      - MINIO_SECRET_KEY=${MINIO_ROOT_PASSWORD:-minioadmin123}
      - MINIO_USE_SSL=false
      - JWT_SECRET=${JWT_SECRET:-your-secret-key-change-me}
      - JWT_EXPIRE_HOURS=24
      - CLICKHOUSE_HOST=clickhouse
      - CLICKHOUSE_PORT=9000
      - CLICKHOUSE_USER=${CLICKHOUSE_USER:-default}
      - CLICKHOUSE_PASSWORD=${CLICKHOUSE_PASSWORD:-}
      - CLICKHOUSE_DBNAME=${CLICKHOUSE_DB:-stall_hub_pos}
    ports:
      - "${SERVER_PORT:-8080}:8080"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      nsqd:
        condition: service_healthy
      minio:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
    networks:
      - stalll-pos-network
    restart: unless-stopped

  admin:
    build:
      context: ./admin
      dockerfile: Dockerfile
    container_name: stalll-pos-admin
    ports:
      - "${ADMIN_PORT:-8081}:80"
    depends_on:
      - backend
    networks:
      - stalll-pos-network
    restart: unless-stopped

  cashier:
    build:
      context: ./cashier
      dockerfile: Dockerfile
    container_name: stalll-pos-cashier
    ports:
      - "${CASHIER_PORT:-8082}:8082"
    depends_on:
      - backend
    networks:
      - stalll-pos-network
    restart: unless-stopped

  printer-service:
    build:
      context: ./printer-service
      dockerfile: Dockerfile
    container_name: stalll-pos-printer-service
    environment:
      - PORT=3001
      - NSQ_NSQD_ADDRESS=nsqd:4150
      - NSQ_LOOKUPD_ADDRESS=nsqlookupd:4161
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD:-redis123}
      - REDIS_DB=0
      - SOCKET_IO_PORT=3002
      - SOCKET_IO_CORS_ORIGIN=*
      - PRINT_RETRY_INTERVAL=30000
      - PRINT_MAX_RETRIES=5
      - LOG_LEVEL=info
    ports:
      - "${PRINTER_SERVICE_PORT:-3001}:3001"
      - "${PRINTER_SOCKET_PORT:-3002}:3002"
    depends_on:
      redis:
        condition: service_healthy
      nsqd:
        condition: service_healthy
    volumes:
      - printer-data:/app/data
      - printer-logs:/app/logs
    networks:
      - stalll-pos-network
    restart: unless-stopped

volumes:
  mysql-data:
    driver: local
  redis-data:
    driver: local
  nsq-data:
    driver: local
  minio-data:
    driver: local
  printer-data:
    driver: local
  printer-logs:
    driver: local
  clickhouse-data:
    driver: local
  clickhouse-logs:
    driver: local

networks:
  stalll-pos-network:
    driver: bridge
